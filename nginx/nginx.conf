# ========================================
# Knowledge Base Management — Nginx 配置
# 适用于外网 HTTPS + 内网 HTTP 双模式
#
# 外网访问:   https://kb.company.com
# 内网访问:   http://192.168.1.100 或 http://kb.internal.company.com
#
# 如需自定义域名，替换下方 server_name 和 SSL 路径即可。
# ========================================

types {
    text/event-stream  sse;
}

upstream mcp_gateway {
    server mcp-gateway:8000;
}

# ---------- 外网访问 — HTTPS（需 SSL 证书） ----------
server {
    listen 443 ssl http2;
    server_name kb.company.com;  # ← 替换为你的外网域名

    # SSL 证书路径（放入 nginx/ssl/ 目录）
    ssl_certificate     /etc/nginx/ssl/kb.company.com/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/kb.company.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    # 安全响应头
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # MCP SSE 端点（长连接，需禁用缓冲）
    location /sse {
        proxy_pass http://mcp_gateway/sse;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 3600s;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-API-Key $http_x_api_key;
    }

    # 后台管理页面
    location /admin {
        proxy_pass http://mcp_gateway/admin;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # API 接口
    location /api {
        proxy_pass http://mcp_gateway/api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # 静态资源（7 天缓存）
    location /static {
        proxy_pass http://mcp_gateway/static;
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    # 健康检查
    location /health {
        proxy_pass http://mcp_gateway/health;
        access_log off;
    }
}

# ---------- 外网 HTTP → HTTPS 自动跳转 ----------
server {
    listen 80;
    server_name kb.company.com;  # ← 与外网域名一致
    return 301 https://$server_name$request_uri;
}

# ---------- 内网访问 — HTTP 直连（无需 SSL） ----------
server {
    listen 80;
    server_name kb.internal.company.com localhost 127.0.0.1;  # ← 添加内网 IP 或域名

    # MCP SSE
    location /sse {
        proxy_pass http://mcp_gateway/sse;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 3600s;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # 后台管理
    location /admin {
        proxy_pass http://mcp_gateway/admin;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # API
    location /api {
        proxy_pass http://mcp_gateway/api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # 静态资源
    location /static {
        proxy_pass http://mcp_gateway/static;
        expires 7d;
    }

    # 健康检查
    location /health {
        proxy_pass http://mcp_gateway/health;
        access_log off;
    }
}
