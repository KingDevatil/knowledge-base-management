<!DOCTYPE html>
<html lang="zh-CN" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 - 中央知识库</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/lucide@latest/dist/umd/lucide.min.js" defer></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'Noto Sans SC', 'system-ui', 'sans-serif'],
                    },
                    colors: {
                        brand: {
                            50: '#eef2ff', 100: '#e0e7ff', 200: '#c7d2fe', 300: '#a5b4fc',
                            400: '#818cf8', 500: '#6366f1', 600: '#4f46e5', 700: '#4338ca',
                            800: '#3730a3', 900: '#312e81',
                        },
                    },
                    animation: {
                        'fade-in': 'fadeIn 0.5s ease-out',
                        'slide-up': 'slideUp 0.5s ease-out',
                        'pulse-slow': 'pulse 3s cubic-bezier(0.4, 0, 0.6, 1) infinite',
                    },
                    keyframes: {
                        fadeIn: { '0%': { opacity: '0' }, '100%': { opacity: '1' } },
                        slideUp: { '0%': { opacity: '0', transform: 'translateY(20px)' }, '100%': { opacity: '1', transform: 'translateY(0)' } },
                    }
                }
            }
        }
    </script>
    <style>
        body { font-family: 'Inter', 'Noto Sans SC', system-ui, sans-serif; }
        .gradient-bg {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 25%, #f093fb 50%, #4facfe 75%, #00f2fe 100%);
            background-size: 400% 400%;
            animation: gradientShift 15s ease infinite;
        }
        @keyframes gradientShift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(20px) saturate(180%);
            -webkit-backdrop-filter: blur(20px) saturate(180%);
        }
        .dark .glass-card { background: rgba(15, 23, 42, 0.85); }
        .input-focus-ring:focus { box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.15); }
        .floating-shape {
            position: absolute; border-radius: 50%;
            filter: blur(80px); opacity: 0.4;
            animation: float 20s infinite ease-in-out;
        }
        @keyframes float {
            0%, 100% { transform: translate(0, 0) scale(1); }
            33% { transform: translate(30px, -30px) scale(1.1); }
            66% { transform: translate(-20px, 20px) scale(0.9); }
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center relative overflow-hidden bg-slate-50 dark:bg-slate-950">

    <div class="absolute inset-0 gradient-bg opacity-[0.08] dark:opacity-[0.12]"></div>
    <div class="floating-shape w-96 h-96 bg-brand-400 -top-48 -left-48" style="animation-delay: 0s;"></div>
    <div class="floating-shape w-80 h-80 bg-cyan-400 -bottom-40 -right-40" style="animation-delay: -7s;"></div>
    <div class="floating-shape w-64 h-64 bg-purple-400 top-1/2 left-1/3" style="animation-delay: -14s;"></div>
    <div class="absolute inset-0 opacity-[0.03] dark:opacity-[0.05]"
         style="background-image: radial-gradient(circle at 1px 1px, currentColor 1px, transparent 0); background-size: 32px 32px;">
    </div>

    <button onclick="toggleTheme()"
            class="absolute top-6 right-6 p-2.5 rounded-xl bg-white/80 dark:bg-slate-800/80 backdrop-blur-lg border border-slate-200 dark:border-slate-700 shadow-sm hover:shadow-md transition-all duration-300 group">
        <i data-lucide="sun" class="w-5 h-5 text-amber-500 hidden dark:block"></i>
        <i data-lucide="moon" class="w-5 h-5 text-slate-600 block dark:hidden"></i>
    </button>

    <div class="w-full max-w-md px-6 relative z-10 animate-slide-up">
        <div class="text-center mb-10">
            <div class="relative inline-flex items-center justify-center mb-6">
                <div class="absolute inset-0 bg-brand-500 rounded-2xl blur-xl opacity-20 animate-pulse-slow"></div>
                <div class="relative inline-flex items-center justify-center w-16 h-16 rounded-2xl bg-gradient-to-br from-brand-500 to-brand-700 shadow-lg shadow-brand-500/25">
                    <svg class="w-8 h-8 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 012-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10"></path>
                    </svg>
                </div>
            </div>
            <h1 class="text-3xl font-bold text-slate-900 dark:text-white tracking-tight mb-2">中央知识库</h1>
            <p class="text-slate-500 dark:text-slate-400 text-sm font-medium">Knowledge Base Management</p>
        </div>

        <div class="glass-card rounded-3xl shadow-xl shadow-slate-200/50 dark:shadow-black/20 border border-white/50 dark:border-slate-700/50 p-8">
            <div class="mb-6">
                <h2 class="text-lg font-semibold text-slate-900 dark:text-white mb-1">欢迎回来</h2>
                <p class="text-sm text-slate-500 dark:text-slate-400">请输入管理员账号密码继续</p>
            </div>

            {% if error %}
            <div class="mb-5 p-3.5 bg-red-50 dark:bg-red-500/10 border border-red-200 dark:border-red-500/20 rounded-xl text-red-700 dark:text-red-400 text-sm flex items-center gap-2">
                <i data-lucide="alert-circle" class="w-4 h-4 flex-shrink-0"></i>
                <span>{{ error }}</span>
            </div>
            {% endif %}

            <form method="post" action="/admin/login" class="space-y-5">
                <input type="hidden" name="next" value="{{ next }}">

                <div class="group">
                    <label class="block text-sm font-medium text-slate-700 dark:text-slate-300 mb-2">用户名</label>
                    <div class="relative">
                        <div class="absolute inset-y-0 left-0 pl-3.5 flex items-center pointer-events-none">
                            <i data-lucide="user" class="w-4.5 h-4.5 text-slate-400 group-focus-within:text-brand-500 transition-colors"></i>
                        </div>
                        <input type="text" name="username" required
                            class="w-full pl-10 pr-4 py-3 bg-slate-50 dark:bg-slate-800/50 border border-slate-200 dark:border-slate-700 rounded-xl text-sm text-slate-900 dark:text-white placeholder-slate-400 focus:outline-none focus:border-brand-500 focus:ring-0 input-focus-ring transition-all duration-200"
                            placeholder="请输入用户名">
                    </div>
                </div>

                <div class="group">
                    <div class="flex items-center justify-between mb-2">
                        <label class="block text-sm font-medium text-slate-700 dark:text-slate-300">密码</label>
                    </div>
                    <div class="relative">
                        <div class="absolute inset-y-0 left-0 pl-3.5 flex items-center pointer-events-none">
                            <i data-lucide="lock" class="w-4.5 h-4.5 text-slate-400 group-focus-within:text-brand-500 transition-colors"></i>
                        </div>
                        <input type="password" name="password" id="password" required
                            class="w-full pl-10 pr-12 py-3 bg-slate-50 dark:bg-slate-800/50 border border-slate-200 dark:border-slate-700 rounded-xl text-sm text-slate-900 dark:text-white placeholder-slate-400 focus:outline-none focus:border-brand-500 focus:ring-0 input-focus-ring transition-all duration-200"
                            placeholder="请输入密码">
                        <button type="button" onclick="togglePassword()"
                            class="absolute right-3 top-1/2 -translate-y-1/2 p-1.5 rounded-lg text-slate-400 hover:text-slate-600 dark:hover:text-slate-300 hover:bg-slate-100 dark:hover:bg-slate-700 transition-all">
                            <i data-lucide="eye" id="eye-icon" class="w-4 h-4"></i>
                        </button>
                    </div>
                </div>

                <button type="submit"
                    class="w-full py-3.5 bg-gradient-to-r from-brand-600 to-brand-500 hover:from-brand-700 hover:to-brand-600 text-white text-sm font-semibold rounded-xl shadow-lg shadow-brand-500/25 hover:shadow-brand-500/40 focus:outline-none focus:ring-2 focus:ring-brand-500 focus:ring-offset-2 dark:focus:ring-offset-slate-900 transition-all duration-300 hover:-translate-y-0.5 active:translate-y-0">
                    <span class="flex items-center justify-center gap-2">
                        <span>登 录</span>
                        <i data-lucide="arrow-right" class="w-4 h-4"></i>
                    </span>
                </button>
            </form>
        </div>

        <div class="mt-8 text-center space-y-3">
            <div class="flex items-center justify-center gap-4 text-xs text-slate-400">
                <span class="flex items-center gap-1.5">
                    <span class="w-1.5 h-1.5 rounded-full bg-emerald-500 animate-pulse"></span>
                    系统运行正常
                </span>
                <span>v2.1.0</span>
            </div>
            <p class="text-xs text-slate-400 dark:text-slate-600">
                 2026 Enterprise KB. 安全加密传输中 🔒
            </p>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            if (typeof lucide !== 'undefined') lucide.createIcons();
        });

        function togglePassword() {
            const input = document.getElementById('password');
            const icon = document.getElementById('eye-icon');
            if (input.type === 'password') {
                input.type = 'text';
                icon.setAttribute('data-lucide', 'eye-off');
            } else {
                input.type = 'password';
                icon.setAttribute('data-lucide', 'eye');
            }
            lucide.createIcons();
        }

        function toggleTheme() {
            const html = document.documentElement;
            if (html.classList.contains('dark')) {
                html.classList.remove('dark');
                localStorage.theme = 'light';
            } else {
                html.classList.add('dark');
                localStorage.theme = 'dark';
            }
            lucide.createIcons();
        }

        if (localStorage.theme === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark');
        }
    </script>
</body>
</html>
