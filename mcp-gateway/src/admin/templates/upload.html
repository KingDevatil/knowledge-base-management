{% extends "base.html" %}

{% block title %}上传文档 - 文档管理{% endblock %}

{% block content %}
<div class="p-8 max-w-2xl mx-auto">
    <!-- 页面标题 -->
    <div class="mb-6">
        <h1 class="text-2xl font-bold text-slate-900 dark:text-white">上传 Markdown 文件</h1>
        <p class="text-sm text-slate-500 dark:text-slate-400 mt-1">支持拖拽或选择多个 .md 文件</p>
    </div>

    {% if error %}
    <div class="alert alert-error mb-5">{{ error }}</div>
    {% endif %}

    <form method="post" action="/admin/documents/upload" enctype="multipart/form-data" class="card p-6 space-y-6" id="upload-form">
        <!-- 文件上传区域 -->
        <div>
            <label class="form-label">选择文件 <span class="text-red-500">*</span></label>
            <div class="border-2 border-dashed border-slate-300 dark:border-slate-600 rounded-2xl p-10 text-center hover:border-brand-400 dark:hover:border-brand-500 hover:bg-brand-50/30 dark:hover:bg-brand-500/5 transition-all cursor-pointer group" id="drop-zone">
                <div class="w-14 h-14 mx-auto mb-4 rounded-2xl bg-slate-100 dark:bg-slate-800 group-hover:bg-brand-100 dark:group-hover:bg-brand-500/10 flex items-center justify-center transition-colors">
                    <i data-lucide="upload-cloud" class="w-7 h-7 text-slate-400 dark:text-slate-500 group-hover:text-brand-500 dark:group-hover:text-brand-400 transition-colors"></i>
                </div>
                <p class="text-sm text-slate-600 dark:text-slate-300 mb-1">拖拽文件到此处，或 <span class="text-brand-600 dark:text-brand-400 font-medium">点击选择</span></p>
                <p class="text-xs text-slate-400 dark:text-slate-500">支持多个 .md 文件</p>
                <input type="file" id="file-input" name="files" accept=".md" multiple required class="hidden">
            </div>

            <!-- 文件列表 -->
            <div id="file-list" class="mt-4 space-y-2 hidden">
                <p class="text-xs font-medium text-slate-500 dark:text-slate-400">已选择 <span id="file-count">0</span> 个文件</p>
            </div>
        </div>

        <!-- 目标目录 -->
        <div>
            <label class="form-label">目标目录</label>
            <div class="flex items-center gap-2 p-3 rounded-xl border border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-900">
                <i data-lucide="folder" class="w-4 h-4 text-amber-500 flex-shrink-0"></i>
                <span id="selected-dir" class="text-sm text-slate-600 dark:text-slate-400 flex-1 truncate">{{ path or '根目录' }}</span>
                <button type="button" onclick="openDirPicker()" class="text-xs text-brand-600 dark:text-brand-400 hover:text-brand-700 font-medium flex-shrink-0">
                    选择目录
                </button>
            </div>
            <input type="hidden" name="path" id="path-input" value="{{ path }}">
        </div>

        <!-- 标签 -->
        <div>
            <label class="form-label">标签（逗号分隔，所有文件共用）</label>
            <input type="text" name="tags" class="form-input" placeholder="技术, API">
        </div>

        <div class="flex gap-3 pt-2">
            <button type="submit" class="btn-primary" id="submit-btn">
                <i data-lucide="upload" class="w-4 h-4" id="submit-icon"></i>
                <span id="submit-text">开始导入</span>
            </button>
            <a href="/admin/documents" class="btn-secondary" id="cancel-btn">取消</a>
        </div>

        <!-- 加载状态 -->
        <div id="upload-status" class="hidden">
            <div class="alert alert-info">
                <div class="flex items-center gap-3">
                    <svg class="animate-spin h-5 w-5 text-brand-600 dark:text-brand-400 flex-shrink-0" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                        <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                        <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"></path>
                    </svg>
                    <div>
                        <p class="font-medium text-slate-700 dark:text-slate-300" id="status-text">正在上传...</p>
                        <p class="text-xs text-slate-500 dark:text-slate-400 mt-0.5" id="status-detail">请稍候</p>
                    </div>
                </div>
                <div class="mt-3 bg-white/50 dark:bg-slate-800/50 rounded-lg p-3">
                    <div class="flex justify-between text-xs text-slate-500 mb-1">
                        <span>进度</span>
                        <span id="progress-text">0 / 0</span>
                    </div>
                    <div class="w-full h-1.5 bg-slate-200 dark:bg-slate-700 rounded-full overflow-hidden">
                        <div id="progress-bar" class="h-full bg-brand-500 rounded-full transition-all duration-300" style="width: 0%"></div>
                    </div>
                </div>
            </div>
        </div>
    </form>
</div>

<!-- 目录选择弹窗 -->
<div id="dir-picker-modal" class="fixed inset-0 z-50" style="display:none">
    <div class="absolute inset-0 bg-black/40 backdrop-blur-sm" onclick="closeDirPicker()"></div>
    <div class="fixed inset-0 flex items-center justify-center p-4 pointer-events-none">
        <div class="bg-white dark:bg-slate-900 rounded-2xl shadow-2xl border border-slate-200 dark:border-slate-800 p-6 w-full max-w-md pointer-events-auto" onclick="event.stopPropagation()">
            <div class="flex items-center justify-between mb-4">
                <h3 class="text-lg font-semibold text-slate-900 dark:text-white">选择目标目录</h3>
                <button onclick="closeDirPicker()" class="p-1.5 rounded-lg text-slate-400 hover:text-slate-600 dark:hover:text-slate-300 hover:bg-slate-100 dark:hover:bg-slate-800 transition-colors">
                    <i data-lucide="x" class="w-5 h-5"></i>
                </button>
            </div>
            <div id="dir-picker-tree" class="max-h-64 overflow-y-auto space-y-1">
                <div class="text-sm text-slate-400 text-center py-8">
                    <i data-lucide="loader" class="w-5 h-5 animate-spin mx-auto"></i>
                </div>
            </div>
            <div class="flex gap-3 mt-4 pt-4 border-t border-slate-100 dark:border-slate-800">
                <button onclick="selectDir('')" class="btn-secondary flex-1 text-sm">根目录</button>
                <button onclick="confirmDirPicker()" class="btn-primary flex-1 text-sm">确认选择</button>
            </div>
        </div>
    </div>
</div>

<script>
    let selectedFiles = [];
    let pickedDir = '{{ path or "" }}';
    let dirPickerSelected = '';

    // ---------- 文件选择 ----------
function handleFiles(files) {
    selectedFiles = Array.from(files).filter(f => f.name.endsWith('.md'));
    const list = document.getElementById('file-list');
    const count = document.getElementById('file-count');

    if (selectedFiles.length === 0) {
        list.classList.add('hidden');
        return;
    }

    list.classList.remove('hidden');
    count.textContent = selectedFiles.length;

    // 重建文件列表
    let html = '';
    selectedFiles.forEach((f, i) => {
        const size = (f.size / 1024).toFixed(1);
        html += `
            <div class="flex items-center gap-3 px-3 py-2 rounded-lg bg-slate-50 dark:bg-slate-800/50">
                <i data-lucide="file-text" class="w-4 h-4 text-brand-500 flex-shrink-0"></i>
                <span class="text-sm text-slate-700 dark:text-slate-300 flex-1 truncate">${f.name}</span>
                <span class="text-xs text-slate-400">${size} KB</span>
                <button type="button" onclick="removeFile(${i})" class="p-1 rounded text-slate-400 hover:text-red-500 hover:bg-red-50 dark:hover:bg-red-500/10 transition-colors">
                    <i data-lucide="x" class="w-3 h-3"></i>
                </button>
            </div>`;
    });
    // 保留计数行，替换文件列表
    const countHtml = list.querySelector('p') ? list.querySelector('p').outerHTML : '<p class="text-xs font-medium text-slate-500 dark:text-slate-400">已选择 <span id="file-count">' + selectedFiles.length + '</span> 个文件</p>';
    list.innerHTML = countHtml + html;
    if (typeof lucide !== 'undefined') lucide.createIcons();
}

function removeFile(index) {
    selectedFiles.splice(index, 1);
    // 直接用 selectedFiles 重建显示，不依赖 input.files
    handleFiles(selectedFiles);
    // 同步更新 input.files
    const dt = new DataTransfer();
    selectedFiles.forEach(f => dt.items.add(f));
    document.getElementById('file-input').files = dt.files;
}

    // 点击选择
    document.getElementById('drop-zone').addEventListener('click', (e) => {
        if (e.target !== document.getElementById('file-input')) {
            document.getElementById('file-input').click();
        }
    });
    document.getElementById('file-input').addEventListener('change', (e) => {
        handleFiles(e.target.files);
    });

    // 拖拽
    document.addEventListener('dragover', (e) => e.preventDefault());
    document.addEventListener('drop', (e) => e.preventDefault());
    const dz = document.getElementById('drop-zone');
    dz.addEventListener('dragover', (e) => {
        e.preventDefault();
        dz.classList.add('border-brand-400', 'dark:border-brand-500', 'bg-brand-50/50', 'dark:bg-brand-500/10');
    });
    dz.addEventListener('dragleave', () => {
        dz.classList.remove('border-brand-400', 'dark:border-brand-500', 'bg-brand-50/50', 'dark:bg-brand-500/10');
    });
    dz.addEventListener('drop', (e) => {
        e.preventDefault();
        dz.classList.remove('border-brand-400', 'dark:border-brand-500', 'bg-brand-50/50', 'dark:bg-brand-500/10');
        handleFiles(e.dataTransfer.files);
        const dt = new DataTransfer();
        Array.from(e.dataTransfer.files).filter(f => f.name.endsWith('.md')).forEach(f => dt.items.add(f));
        document.getElementById('file-input').files = dt.files;
    });

    // ---------- 目录选择 ----------
    function openDirPicker() {
        dirPickerSelected = pickedDir;
        document.getElementById('dir-picker-modal').style.display = 'block';
        loadDirPickerTree();
    }

    function closeDirPicker() {
        document.getElementById('dir-picker-modal').style.display = 'none';
    }

    async function loadDirPickerTree() {
        const container = document.getElementById('dir-picker-tree');
        try {
            const resp = await fetch('/admin/api/directories');
            const tree = await resp.json();
            renderDirPicker(tree, container, 0);
        } catch {
            container.innerHTML = '<div class="text-sm text-red-500 text-center py-4">加载失败</div>';
        }
    }

    function renderDirPicker(node, container, depth) {
        container.innerHTML = '';
        if (!node.children || node.children.length === 0) {
            container.innerHTML = '<div class="text-sm text-slate-400 text-center py-4">暂无目录</div>';
            return;
        }
        node.children.forEach(child => {
            const item = document.createElement('div');
            const padding = depth * 16 + 8;
            const path = child.path || child.name;
            const isSelected = dirPickerSelected === path;

            item.className = `flex items-center gap-2 px-3 py-2 rounded-lg cursor-pointer transition-colors ${
                isSelected ? 'bg-brand-50 dark:bg-brand-500/10 text-brand-700 dark:text-brand-400' : 'hover:bg-slate-50 dark:hover:bg-slate-800/50 text-slate-700 dark:text-slate-300'
            }`;
            item.style.paddingLeft = padding + 'px';

            item.innerHTML = `
                <i data-lucide="folder" class="w-4 h-4 text-amber-500 flex-shrink-0"></i>
                <span class="text-sm flex-1 truncate">${child.name}</span>
                ${isSelected ? '<i data-lucide="check" class="w-3.5 h-3.5 text-brand-500 flex-shrink-0"></i>' : ''}
            `;

            item.addEventListener('click', () => {
                dirPickerSelected = path;
                loadDirPickerTree();
            });

            container.appendChild(item);

            if (child.children && child.children.length > 0) {
                const sub = document.createElement('div');
                renderDirPicker(child, sub, depth + 1);
                container.appendChild(sub);
            }
        });
        if (typeof lucide !== 'undefined') lucide.createIcons();
    }

    function selectDir(path) {
        dirPickerSelected = path;
        // 直接确认
        pickedDir = path;
        document.getElementById('selected-dir').textContent = path || '根目录';
        document.getElementById('path-input').value = path;
        closeDirPicker();
    }

    function confirmDirPicker() {
        pickedDir = dirPickerSelected;
        document.getElementById('selected-dir').textContent = pickedDir || '根目录';
        document.getElementById('path-input').value = pickedDir;
        closeDirPicker();
    }

    // ---------- 表单提交 ----------
    const form = document.getElementById('upload-form');
    const submitBtn = document.getElementById('submit-btn');
    const submitIcon = document.getElementById('submit-icon');
    const submitText = document.getElementById('submit-text');
    const cancelBtn = document.getElementById('cancel-btn');
    const uploadStatus = document.getElementById('upload-status');
    const statusText = document.getElementById('status-text');
    const statusDetail = document.getElementById('status-detail');
    const progressText = document.getElementById('progress-text');
    const progressBar = document.getElementById('progress-bar');

    form.addEventListener('submit', async function(e) {
        e.preventDefault();

        if (selectedFiles.length === 0) {
            alert('请选择至少一个 .md 文件');
            return;
        }

        // 禁用界面
        submitBtn.disabled = true;
        submitBtn.classList.add('opacity-70', 'cursor-not-allowed');
        submitText.textContent = '处理中...';
        cancelBtn.classList.add('pointer-events-none', 'opacity-50');
        uploadStatus.classList.remove('hidden');
        statusText.textContent = '正在上传...';
        progressText.textContent = `0 / ${selectedFiles.length}`;
        progressBar.style.width = '0%';

        const tags = document.querySelector('[name="tags"]').value;
        let completed = 0;
        let failed = 0;

        for (let i = 0; i < selectedFiles.length; i++) {
            const file = selectedFiles[i];
            statusDetail.textContent = `${file.name}`;
            progressText.textContent = `${i} / ${selectedFiles.length}`;

            const formData = new FormData();
            formData.append('files', file);
            formData.append('path', pickedDir);
            formData.append('tags', tags);

            try {
                const resp = await fetch('/admin/api/upload', { method: 'POST', body: formData });
                if (resp.ok) {
                    completed++;
                } else {
                    failed++;
                }
            } catch {
                failed++;
            }

            const pct = ((i + 1) / selectedFiles.length * 100);
            progressBar.style.width = Math.min(pct, 100) + '%';
            progressText.textContent = `${i + 1} / ${selectedFiles.length}`;
        }

        // 完成
        progressBar.style.width = '100%';
        if (failed === 0) {
            statusText.textContent = `✅ 全部完成！${completed} 个文档导入成功`;
            statusDetail.textContent = '即将跳转到文档列表...';
            setTimeout(() => { window.location.href = '/admin/documents?path=' + encodeURIComponent(pickedDir); }, 1500);
        } else {
            statusText.textContent = `⚠️ 完成 ${completed} 个，${failed} 个失败`;
            statusDetail.textContent = '请检查文件格式后重试';
            submitBtn.disabled = false;
            submitBtn.classList.remove('opacity-70', 'cursor-not-allowed');
            submitText.textContent = '重试失败文件';
            cancelBtn.classList.remove('pointer-events-none', 'opacity-50');
        }
    });
</script>
{% endblock %}
