version: "3.9"

networks:
  kb-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16

services:
  nginx:
    image: nginx:1.27-alpine
    restart: always
    ports:
      # 外网 HTTPS（可通过 .env 的 EXTERNAL_IP 指定监听 IP）
      - "${EXTERNAL_IP:-0.0.0.0}:443:443"
      # 内网 HTTP
      - "${INTERNAL_IP:-0.0.0.0}:80:80"
    volumes:
      - ./nginx/nginx.conf.template:/etc/nginx/templates/nginx.conf.template:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    environment:
      - EXTERNAL_DOMAIN=${EXTERNAL_DOMAIN:-kb.company.com}
      - INTERNAL_DOMAIN=${INTERNAL_DOMAIN:-kb.internal.company.com}
    command: >
      /bin/sh -c "envsubst < /etc/nginx/templates/nginx.conf.template > /etc/nginx/nginx.conf && nginx -g 'daemon off;'"
    depends_on:
      mcp-gateway:
        condition: service_started
    networks:
      - kb-network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  redis:
    image: redis:7-alpine
    restart: always
    volumes:
      - redis_data:/data
    ports:
      - "127.0.0.1:6379:6379"
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - kb-network

  chroma:
    image: chromadb/chroma:0.6.4
    restart: always
    volumes:
      - chroma_data:/chroma/chroma
    ports:
      - "127.0.0.1:8001:8000"
    environment:
      - ANONYMIZED_TELEMETRY=false
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/heartbeat"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - kb-network

  minio:
    image: minio/minio:RELEASE.2025-01-20T14-49-07Z
    restart: always
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    ports:
      - "127.0.0.1:9000:9000"
      - "127.0.0.1:9001:9001"
    environment:
      - MINIO_ROOT_USER=${MINIO_ROOT_USER:-minioadmin}
      - MINIO_ROOT_PASSWORD=${MINIO_SECRET_KEY:-minioadmin}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - kb-network

  ollama:
    image: ollama/ollama:0.6.0
    restart: always
    volumes:
      - ollama_data:/root/.ollama
    ports:
      - "127.0.0.1:11434:11434"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11434/api/tags"]
      interval: 30s
      timeout: 10s
      retries: 5
    networks:
      - kb-network

  mcp-gateway:
    build: ./mcp-gateway
    restart: always
    ports:
      - "127.0.0.1:8000:8000"
    volumes:
      - ./config:/app/config:ro
    environment:
      - REDIS_URL=redis://redis:6379/0
      - CHROMA_HOST=chroma
      - CHROMA_PORT=8000
      - OLLAMA_URL=http://ollama:11434
      - MINIO_ENDPOINT=minio:9000
      - MINIO_ACCESS_KEY=${MINIO_ROOT_USER:-minioadmin}
      - MINIO_SECRET_KEY=${MINIO_SECRET_KEY:-minioadmin}
      - MINIO_BUCKET=kb-sources
      - MINIO_SECURE=false
      - SESSION_SECRET=${SESSION_SECRET:?SESSION_SECRET is required in production}
      - DEBUG=${DEBUG:-false}
      - CORS_ORIGINS=${CORS_ORIGINS:-https://${EXTERNAL_DOMAIN:-kb.company.com},http://${INTERNAL_DOMAIN:-kb.internal.company.com}}
      - EXTERNAL_DOMAIN=${EXTERNAL_DOMAIN:-kb.company.com}
      - INTERNAL_DOMAIN=${INTERNAL_DOMAIN:-kb.internal.company.com}
    depends_on:
      redis:
        condition: service_healthy
      chroma:
        condition: service_healthy
      minio:
        condition: service_healthy
    networks:
      - kb-network

volumes:
  redis_data:
  chroma_data:
  minio_data:
  ollama_data:
