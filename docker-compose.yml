version: "3.9"

networks:
  kb-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16

services:
  nginx:
    image: ${MIRROR_PREFIX:-}nginx:1.27-alpine
    restart: always
    ports:
      # 外网 HTTPS（可通过 .env 的 EXTERNAL_IP 指定监听 IP）
      - "${EXTERNAL_IP:-0.0.0.0}:443:443"
      # 内网 HTTP
      - "${INTERNAL_IP:-0.0.0.0}:80:80"
    volumes:
      - ./nginx/nginx.conf.template:/etc/nginx/templates/nginx.conf.template:ro
      - ./nginx/render-nginx-conf.sh:/etc/nginx/templates/render-nginx-conf.sh:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    environment:
      - EXTERNAL_DOMAIN=${EXTERNAL_DOMAIN:-}
      - INTERNAL_DOMAIN=${INTERNAL_DOMAIN:-localhost}
    command: >
      /bin/sh -c "sh /etc/nginx/templates/render-nginx-conf.sh && nginx -g 'daemon off;'"
    depends_on:
      mcp-gateway:
        condition: service_started
    networks:
      - kb-network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  redis:
    image: ${MIRROR_PREFIX:-}redis:7-alpine
    restart: always
    volumes:
      - redis_data:/data
    ports:
      - "127.0.0.1:6379:6379"
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - kb-network

  chroma:
    image: ${MIRROR_PREFIX:-}chromadb/chroma:1.5.9
    restart: always
    volumes:
      - ${HOST_KBDATA_DIR:-./kbdata}/chroma:/chroma/chroma
    ports:
      - "127.0.0.1:8001:8000"
    environment:
      - ANONYMIZED_TELEMETRY=false
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/heartbeat"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - kb-network

  minio:
    image: ${MIRROR_PREFIX:-}minio/minio:RELEASE.2025-01-20T14-49-07Z
    restart: always
    command: server /data --console-address ":9001"
    volumes:
      - ${HOST_KBDATA_DIR:-./kbdata}/minio:/data
    ports:
      - "127.0.0.1:9000:9000"
      - "127.0.0.1:9001:9001"
    environment:
      - MINIO_ROOT_USER=${MINIO_ROOT_USER:-minioadmin}
      - MINIO_ROOT_PASSWORD=${MINIO_ROOT_PASSWORD:-minioadmin}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - kb-network

  ollama:
    image: ${MIRROR_PREFIX:-}ollama/ollama:0.6.0
    restart: always
    volumes:
      - ollama_data:/root/.ollama
    ports:
      - "127.0.0.1:11434:11434"
    environment:
      - OLLAMA_NUM_PARALLEL=${OLLAMA_NUM_PARALLEL:-4}
    # GPU 加速：将 docker-compose.gpu.yml 合并加载
    #   CPU 模式: docker compose up
    #   GPU 模式: docker compose -f docker-compose.yml -f docker-compose.gpu.yml up
    #   自动检测: 见下方 Makefile / start.sh
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11434/api/tags"]
      interval: 30s
      timeout: 10s
      retries: 5
    networks:
      - kb-network

  mcp-gateway:
    build:
      context: ./mcp-gateway
      args:
        MIRROR_PREFIX: ${MIRROR_PREFIX:-}
        PIP_INDEX_URL: ${PIP_INDEX_URL:-https://pypi.org/simple}
        PIP_TRUSTED_HOST: ${PIP_TRUSTED_HOST:-pypi.org}
        APT_MIRROR: ${APT_MIRROR:-deb.debian.org}
    restart: always
    ports:
      - "127.0.0.1:8000:8000"
    volumes:
      - ${HOST_KBDATA_DIR:-./kbdata}:/app/data:rw
    environment:
      - RUNNING_IN_DOCKER=true
      - KBDATA_DIR=/app/data
      - SERVICE_ENV_FILE=/app/data/config/service.env
      - REDIS_URL=redis://redis:6379/0
      - CHROMA_HOST=chroma
      - CHROMA_PORT=8000
      - OLLAMA_URL=http://ollama:11434
      - MINIO_ENDPOINT=minio:9000
      - MINIO_ACCESS_KEY=${MINIO_ROOT_USER:-minioadmin}
      - MINIO_SECRET_KEY=${MINIO_ROOT_PASSWORD:-minioadmin}
      - MINIO_BUCKET=kb-sources
      - MINIO_SECURE=false
      - SESSION_SECRET=${SESSION_SECRET:?SESSION_SECRET is required in production}
      - DEBUG=${DEBUG:-false}
      - CORS_ORIGINS=${CORS_ORIGINS:-*}
      - EXTERNAL_DOMAIN=${EXTERNAL_DOMAIN:-}
      - INTERNAL_DOMAIN=${INTERNAL_DOMAIN:-localhost}
      - ADMIN_ACCOUNTS_FILE=${ADMIN_ACCOUNTS_FILE:-/app/data/config/admin_accounts.json}
      - API_KEY_FILE=${API_KEY_FILE:-/app/data/config/api_keys.json}
      - ADMIN_INITIAL_USERNAME=${ADMIN_INITIAL_USERNAME:-admin}
      - ADMIN_INITIAL_PASSWORD=${ADMIN_INITIAL_PASSWORD:-123456}
    depends_on:
      redis:
        condition: service_healthy
      chroma:
        condition: service_healthy
      minio:
        condition: service_healthy
    networks:
      - kb-network

volumes:
  redis_data:
  ollama_data:
