<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>知识库管理桌面控制台</title>
<style>
  :root {
    --bg: #f5f6f8;
    --panel: #ffffff;
    --card: #f9fafb;
    --card-hover: #f3f4f6;
    --accent: #2563eb;
    --accent-light: #eff6ff;
    --green: #059669;
    --green-light: #ecfdf5;
    --red: #dc2626;
    --red-light: #fef2f2;
    --yellow: #d97706;
    --yellow-light: #fffbeb;
    --text: #111827;
    --text-secondary: #4b5563;
    --text-dim: #9ca3af;
    --border: #e5e7eb;
    --border-light: #f3f4f6;
    --shadow: 0 1px 3px rgba(0,0,0,0.06);
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    background: var(--bg);
    color: var(--text);
    height: 100vh;
    display: flex;
    overflow: hidden;
    font-size: 13px;
    line-height: 1.5;
  }

  /* ---- Sidebar ---- */
  .sidebar {
    width: 320px;
    min-width: 320px;
    background: var(--panel);
    display: flex;
    flex-direction: column;
    border-right: 1px solid var(--border);
    transition: width 0.25s ease, min-width 0.25s ease, opacity 0.2s ease;
    overflow: hidden;
  }
  .sidebar.collapsed {
    width: 0;
    min-width: 0;
    border-right: none;
  }
  .sidebar-inner {
    width: 320px;
    min-width: 320px;
    display: flex;
    flex-direction: column;
    height: 100%;
  }
  .sidebar-header {
    padding: 12px 16px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 8px;
  }
  .sidebar-header .title-group { flex: 1; min-width: 0; }
  .sidebar-header h1 {
    font-size: 14px;
    font-weight: 600;
    color: var(--text);
    margin: 0;
  }
  .sidebar-header .subtitle {
    font-size: 11px;
    color: var(--text-dim);
  }
  .sidebar-header .close-btn {
    flex-shrink: 0;
    width: 28px;
    height: 28px;
    display: flex;
    align-items: center;
    justify-content: center;
    border: 1px solid var(--border);
    border-radius: 6px;
    background: var(--card);
    color: var(--text-secondary);
    cursor: pointer;
    transition: background 0.15s, color 0.15s;
  }
  .sidebar-header .close-btn:hover {
    background: var(--card-hover);
    color: var(--text);
  }
  .sidebar-header .close-btn svg { width: 14px; height: 14px; }

  /* Toolbar */
  .toolbar {
    display: flex;
    gap: 4px;
    padding: 8px 16px;
    border-bottom: 1px solid var(--border);
    flex-wrap: wrap;
  }
  .toolbar button {
    padding: 4px 8px;
    font-size: 11px;
    font-weight: 500;
    border: 1px solid var(--border);
    border-radius: 6px;
    background: var(--panel);
    color: var(--text-secondary);
    cursor: pointer;
    transition: background 0.15s, border-color 0.15s, color 0.15s;
    white-space: nowrap;
  }
  .toolbar button:hover { background: var(--card); border-color: #d1d5db; color: var(--text); }
  .toolbar button.primary { background: var(--accent); color: #fff; border-color: var(--accent); }
  .toolbar button.primary:hover { background: #1d4ed8; }
  .toolbar button.danger  { background: var(--red);   color: #fff; border-color: var(--red); }
  .toolbar button.danger:hover { background: #b91c1c; }
  .toolbar button:disabled { opacity: 0.4; cursor: not-allowed; pointer-events: none; }

  /* Toggle row */
  .toggle-row {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 6px 16px;
    border-bottom: 1px solid var(--border);
    font-size: 11px;
    color: var(--text-secondary);
  }
  .toggle-row label { cursor: pointer; user-select: none; }
  .toggle-switch {
    position: relative;
    width: 32px;
    height: 18px;
    background: #d1d5db;
    border-radius: 9px;
    cursor: pointer;
    transition: background 0.2s;
    flex-shrink: 0;
  }
  .toggle-switch.on { background: var(--accent); }
  .toggle-switch::after {
    content: '';
    position: absolute;
    top: 2px;
    left: 2px;
    width: 14px;
    height: 14px;
    background: #fff;
    border-radius: 50%;
    transition: transform 0.2s;
    box-shadow: 0 1px 2px rgba(0,0,0,0.1);
  }
  .toggle-switch.on::after { transform: translateX(14px); }

  /* Service list */
  .service-list {
    flex: 1;
    overflow-y: auto;
    padding: 8px 12px;
  }
  .svc-card {
    background: var(--panel);
    border-radius: 8px;
    padding: 10px 12px;
    margin-bottom: 6px;
    border: 1px solid var(--border);
    border-left: 3px solid var(--border);
    transition: border-color 0.15s, box-shadow 0.15s;
  }
  .svc-card:hover { box-shadow: var(--shadow); }
  .svc-card.running  { border-left-color: var(--green); }
  .svc-card.stopped  { border-left-color: #d1d5db; }
  .svc-card.starting { border-left-color: var(--yellow); }
  .svc-card.error    { border-left-color: var(--red); }

  .svc-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 4px;
  }
  .svc-name { font-weight: 600; font-size: 13px; color: var(--text); }
  .svc-status {
    font-size: 10px;
    padding: 1px 6px;
    border-radius: 4px;
    font-weight: 500;
    letter-spacing: 0.02em;
  }
  .svc-status.running  { background: var(--green-light); color: var(--green); }
  .svc-status.stopped  { background: var(--card); color: var(--text-dim); }
  .svc-status.starting { background: var(--yellow-light); color: var(--yellow); }
  .svc-status.error    { background: var(--red-light); color: var(--red); }

  .svc-info {
    font-size: 11px;
    color: var(--text-dim);
    margin-bottom: 6px;
  }
  .svc-info span { margin-right: 10px; }

  .svc-actions {
    display: flex;
    gap: 4px;
  }
  .svc-actions button {
    padding: 3px 8px;
    font-size: 11px;
    font-weight: 500;
    border: 1px solid var(--border);
    border-radius: 5px;
    background: var(--panel);
    color: var(--text-secondary);
    cursor: pointer;
    transition: background 0.15s, color 0.15s, border-color 0.15s;
  }
  .svc-actions button:hover { background: var(--card); color: var(--text); }
  .svc-actions button.start-btn:hover { background: var(--green-light); color: var(--green); border-color: #a7f3d0; }
  .svc-actions button.stop-btn:hover  { background: var(--red-light);   color: var(--red); border-color: #fecaca; }
  .svc-actions button:disabled { opacity: 0.3; cursor: not-allowed; pointer-events: none; }

  /* Log panel */
  .log-section {
    border-top: 1px solid var(--border);
    max-height: 160px;
    display: flex;
    flex-direction: column;
  }
  .log-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 5px 16px;
    font-size: 11px;
    color: var(--text-dim);
    flex-shrink: 0;
    cursor: pointer;
    user-select: none;
    transition: background 0.1s;
  }
  .log-header:hover { background: var(--card); }
  .log-header .log-toggle { font-size: 10px; }
  .log-body {
    flex: 1;
    overflow-y: auto;
    padding: 0 16px 6px;
    font-family: 'Cascadia Code', 'Fira Code', 'Consolas', monospace;
    font-size: 11px;
    line-height: 1.6;
    display: none;
  }
  .log-body.expanded { display: block; }
  .log-line { color: var(--text-dim); white-space: pre-wrap; word-break: break-all; }
  .log-line:first-child { margin-top: 4px; }

  /* Main area */
  .main-area {
    flex: 1;
    display: flex;
    flex-direction: column;
    position: relative;
    background: var(--bg);
  }
  .main-area iframe {
    flex: 1;
    border: none;
    background: #fff;
  }

  /* Floating sidebar toggle */
  .sidebar-toggle-float {
    position: absolute;
    top: 10px;
    left: 10px;
    z-index: 100;
    width: 32px;
    height: 32px;
    display: none;
    align-items: center;
    justify-content: center;
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 6px;
    box-shadow: 0 2px 6px rgba(0,0,0,0.08);
    cursor: pointer;
    color: var(--text-secondary);
    transition: background 0.15s, color 0.15s;
  }
  .sidebar-toggle-float:hover { background: var(--card); color: var(--text); }
  .sidebar-toggle-float svg { width: 16px; height: 16px; }
  .sidebar.collapsed ~ .main-area .sidebar-toggle-float { display: flex; }

  /* Busy overlay */
  .busy-overlay {
    position: absolute;
    inset: 0;
    background: rgba(255,255,255,0.6);
    display: none;
    align-items: center;
    justify-content: center;
    z-index: 200;
    backdrop-filter: blur(2px);
  }
  .busy-overlay.show { display: flex; }
  .spinner {
    width: 28px;
    height: 28px;
    border: 3px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 5px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: #d1d5db; border-radius: 3px; }
  ::-webkit-scrollbar-thumb:hover { background: #9ca3af; }
</style>
</head>
<body>
  <!-- Sidebar -->
  <div class="sidebar" id="sidebar">
    <div class="sidebar-inner">
      <div class="sidebar-header">
        <div class="title-group">
          <h1>知识库控制台</h1>
          <div class="subtitle">服务管理 & 仪表盘</div>
        </div>
        <button class="close-btn" onclick="toggleSidebar()" title="隐藏服务栏">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect>
            <line x1="9" y1="3" x2="9" y2="21"></line>
          </svg>
        </button>
      </div>

      <div class="toolbar" id="toolbar">
        <button class="primary" onclick="startAll()">启动全部</button>
        <button class="danger" onclick="stopAll()">停止全部</button>
        <button onclick="refreshState()">刷新</button>
      </div>

      <div class="toggle-row">
        <div class="toggle-switch" id="env-toggle" onclick="toggleEnv()"></div>
        <label onclick="toggleEnv()">使用 .env 配置</label>
      </div>

      <div class="service-list" id="service-list">
        <!-- Populated by JS -->
      </div>

      <div class="log-section" id="log-section">
        <div class="log-header" onclick="toggleLogPanel()">
          <span>日志</span>
          <span class="log-toggle" id="log-toggle-label">展开</span>
        </div>
        <div class="log-body" id="log-body"></div>
      </div>
    </div>
  </div>

  <!-- Main iframe area -->
  <div class="main-area">
    <button class="sidebar-toggle-float" id="sidebar-toggle-float" onclick="toggleSidebar()" title="显示服务栏">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect>
        <line x1="9" y1="3" x2="9" y2="21"></line>
      </svg>
    </button>
    <div class="busy-overlay" id="busy-overlay">
      <div class="spinner"></div>
    </div>
    <iframe id="admin-frame" src="about:blank"></iframe>
  </div>

<script>
var state = null;
var pollTimer = null;
var logExpanded = false;
var lastGatewayStatus = null;

function api() {
  if (window.pywebview && window.pywebview.api) return window.pywebview.api;
  return null;
}

function toggleSidebar() {
  var sidebar = document.getElementById('sidebar');
  sidebar.classList.toggle('collapsed');
}

function toggleLogPanel() {
  logExpanded = !logExpanded;
  var body = document.getElementById('log-body');
  var label = document.getElementById('log-toggle-label');
  if (logExpanded) {
    body.classList.add('expanded');
    label.textContent = '收起';
  } else {
    body.classList.remove('expanded');
    label.textContent = '展开';
  }
}

async function refreshState() {
  var a = api();
  if (!a) return;
  try {
    state = await a.get_state();
    renderUI(state);
  } catch(e) {
    console.error('refreshState error:', e);
  }
}

function renderUI(s) {
  if (!s) return;

  // Env toggle
  var toggle = document.getElementById('env-toggle');
  if (s.useEnvFile) { toggle.classList.add('on'); }
  else { toggle.classList.remove('on'); }

  // Toolbar busy state
  var btns = document.querySelectorAll('#toolbar button');
  btns.forEach(function(b) { b.disabled = !!s.busy; });

  // Admin URL
  var adminUrl = s.adminUrl || 'http://127.0.0.1:8000/admin';
  var gatewayStatus = null;
  for (var gi = 0; gi < (s.services || []).length; gi++) {
    if (s.services[gi].name === 'MCP Gateway') {
      gatewayStatus = s.services[gi].status;
      break;
    }
  }

  // Load once, and reload after Gateway becomes available. If the iframe first
  // loaded while the service was down, WebView keeps showing the connection
  // error unless we explicitly navigate it again.
  var frame = document.getElementById('admin-frame');
  var gatewayJustStarted = gatewayStatus === 'running' && lastGatewayStatus !== 'running';
  if (frame.src === 'about:blank' || frame.src !== adminUrl || gatewayJustStarted) {
    frame.src = adminUrl;
  }
  lastGatewayStatus = gatewayStatus;

  // Services
  var list = document.getElementById('service-list');
  list.innerHTML = '';
  for (var i = 0; i < s.services.length; i++) {
    var svc = s.services[i];
    var card = document.createElement('div');
    card.className = 'svc-card ' + svc.status;

    var urlsHtml = (svc.urls || []).map(function(u) { return '<span>' + esc(u) + '</span>'; }).join('');
    var reqHtml = (svc.requires && svc.requires.length)
      ? '<span>依赖: ' + esc(svc.requires.join(', ')) + '</span>'
      : '';
    var errHtml = svc.error
      ? '<div style="color:var(--red);margin-top:3px;font-size:11px">' + esc(svc.error) + '</div>'
      : '';

    card.innerHTML =
      '<div class="svc-header">' +
        '<span class="svc-name">' + esc(svc.name) + '</span>' +
        '<span class="svc-status ' + svc.status + '">' + statusText(svc.status) + '</span>' +
      '</div>' +
      '<div class="svc-info">' +
        '<span>端口: ' + (svc.port || '-') + '</span>' +
        reqHtml +
      '</div>' +
      (urlsHtml ? '<div class="svc-info">' + urlsHtml + '</div>' : '') +
      errHtml +
      '<div class="svc-actions">' +
        '<button class="start-btn" onclick="startSvc(\'' + esc(svc.name) + '\')" ' +
          (svc.status === 'running' || svc.status === 'starting' ? 'disabled' : '') + '>启动</button>' +
        '<button class="stop-btn" onclick="stopSvc(\'' + esc(svc.name) + '\')" ' +
          (svc.status === 'stopped' || svc.status === 'stopping' ? 'disabled' : '') + '>停止</button>' +
        '<button onclick="restartSvc(\'' + esc(svc.name) + '\')" ' +
          (svc.status === 'starting' || svc.status === 'stopping' ? 'disabled' : '') + '>重启</button>' +
      '</div>';
    list.appendChild(card);
  }

  // Logs
  var logBody = document.getElementById('log-body');
  logBody.innerHTML = (s.logs || []).map(function(line) {
    return '<div class="log-line">' + esc(line) + '</div>';
  }).join('');
  logBody.scrollTop = logBody.scrollHeight;

  // Busy
  var overlay = document.getElementById('busy-overlay');
  if (s.busy) { overlay.classList.add('show'); }
  else { overlay.classList.remove('show'); }
}

function statusText(s) {
  return { running: '运行中', stopped: '未启动', starting: '启动中', stopping: '停止中', error: '异常' }[s] || s;
}

function esc(str) {
  if (!str) return '';
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function showError(msg) {
  var logBody = document.getElementById('log-body');
  if (!logBody) return;
  var d = document.createElement('div');
  d.className = 'log-line';
  d.style.color = 'var(--red)';
  d.textContent = '[' + new Date().toLocaleTimeString() + '] ' + msg;
  logBody.appendChild(d);
  logBody.scrollTop = logBody.scrollHeight;
}

async function startSvc(name) {
  var a = api(); if (!a) return;
  try {
    await a.start_service(name);
    startPolling();
  } catch(e) { showError('Start failed: ' + e); }
}
async function stopSvc(name) {
  var a = api(); if (!a) return;
  try {
    await a.stop_service(name);
    startPolling();
  } catch(e) { showError('Stop failed: ' + e); }
}
async function restartSvc(name) {
  var a = api(); if (!a) return;
  try {
    await a.restart_service(name);
    startPolling();
  } catch(e) { showError('Restart failed: ' + e); }
}
async function startAll() {
  var a = api(); if (!a) return;
  try {
    await a.start_all();
    startPolling();
  } catch(e) { showError('Start all failed: ' + e); }
}
async function stopAll() {
  var a = api(); if (!a) return;
  try {
    await a.stop_all();
    startPolling();
  } catch(e) { showError('Stop all failed: ' + e); }
}
async function toggleEnv() {
  var a = api(); if (!a || !state) return;
  try {
    await a.set_use_env_file(!state.useEnvFile);
    refreshState();
  } catch(e) { showError('Toggle env failed: ' + e); }
}
async function clearLogs() {
  var a = api(); if (!a) return;
  try {
    await a.clear_logs();
    refreshState();
  } catch(e) { showError('Clear logs failed: ' + e); }
}
function reloadIframe() {
  var frame = document.getElementById('admin-frame');
  if (state && state.adminUrl) {
    frame.src = state.adminUrl;
  }
}

function startPolling() {
  if (pollTimer) return;
  refreshState();
  pollTimer = setInterval(async function() {
    await refreshState();
    if (state && !state.busy) {
      clearInterval(pollTimer);
      pollTimer = null;
    }
  }, 1200);
}

// Init
window.addEventListener('pywebviewready', function() {
  refreshState();
  setInterval(refreshState, 5000);
});
</script>
</body>
</html>
