name: MCP Gateway Tests

on:
  pull_request:
    paths:
      - "mcp-gateway/**"
      - "scripts/test.sh"
      - "mcp-gateway/requirements-dev.txt"
      - ".github/workflows/mcp-gateway-tests.yml"
  push:
    branches:
      - main
      - master
    paths:
      - "mcp-gateway/**"
      - "scripts/test.sh"
      - "mcp-gateway/requirements-dev.txt"
      - ".github/workflows/mcp-gateway-tests.yml"

jobs:
  tests:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mcp-gateway

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: "pip"
          cache-dependency-path: |
            mcp-gateway/requirements.txt
            mcp-gateway/requirements-dev.txt

      - name: Install dependencies
        run: python -m pip install -r requirements-dev.txt

      - name: Compile source
        run: python -m compileall -q src tests

      - name: Check dependency declarations
        working-directory: .
        run: python scripts/check_deps_sync.py

      - name: Run tests
        working-directory: .
        run: bash scripts/test.sh -q
